data:
  raw_data_path: "data/raw/ecommerce_events.csv"
  processed_data_path: "data/processed/processed_events.csv"
  results_path: "data/results/"

  required_columns:
    - user_id
    - event_type
    - timestamp

  optional_columns:
    - price
    - product_id
    - session_id
    - revenue

preprocessing:
  session_timeout_minutes: 30

  min_events_per_user: 1

funnel_analysis:
  default_steps:
    - view
    - cart
    - remove_from_cart
    - purchase

  critical_drop_off_threshold: 20.0

cohort_analysis:
  cohort_type: "registration"

  retention_periods: 12

segmentation:
  rfm_quantiles: 5

  clustering:
    min_clusters: 2
    max_clusters: 10
    default_clusters: 5

anomaly_detection:
  statistical_threshold: 3.0

  isolation_forest_contamination: 0.05

  fraud_detection:
    max_events_per_hour: 100
    min_event_diversity: 2
    night_hours: [0, 1, 2, 3, 4]
    night_activity_threshold: 0.8

visualization:
  output_dir: "data/results/"

  figure_dpi: 300
  style: "whitegrid"
  color_palette: "husl"

logging:
  level: "INFO"
  log_file: "monitoring_system.log"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
